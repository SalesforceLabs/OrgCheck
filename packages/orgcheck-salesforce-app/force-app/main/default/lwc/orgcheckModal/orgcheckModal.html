<template>
    <template lwc:if={isShown}>
        <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="modal-heading-01" class="slds-modal slds-fade-in-open slds-modal_medium">
            <div class="slds-modal__container">
                <template lwc:if={isClosable}>
                    <lightning-icon icon-name="utility:close" alternative-text="Close" title="Close" onclick={handleClose} class="slds-modal__close"></lightning-icon>
                </template>
                <div class="slds-modal__header">
                    <h1 id="modal-heading-01" class="slds-modal__title slds-hyphenate">{headerTitle}</h1>
                </div>
                <div class="slds-modal__content modal-content">
                    <template lwc:if={message}>
                        <lightning-formatted-rich-text value={message}></lightning-formatted-rich-text>
                    </template>
                    <template lwc:if={errorChains}>
                        <div class="error-warning">
                            <template lwc:if={hasApiAccessControlIssue}>
                                <p><strong>Your org has API Access Control activated without the option &ldquo;Allow Visualforce 
                                    pages to access APIs&rdquo; checked.</strong></p>
                                <p><strong>Option 1 (short term):</strong> Check the &ldquo;Allow Visualforce pages to access 
                                    APIs&rdquo; option in your org&rsquo;s API Access Control settings to allow any Visualforce 
                                    page (including Org Check) to use the current user&rsquo;s session ID.</p>
                                <p><strong>Option 2 (long term):</strong> Create an External client apps, assign 
                                    the <em>Org Check Users</em> permission set to it, make sure your user is assigned to 
                                    the <em>Org Check Users</em> permission set, and configure Org Check to authenticate 
                                    via that External client apps instead of the Visualforce session.</p>
                            </template>
                        </div>
                        <br />
                        <p>👉 Please review our <a href="http://sfdc.co/OrgCheck-FAQ" target="_blank" rel="external noopener noreferrer">Org Check FAQ</a> and try to resolve this issue in your Org based on our community's feedback.</p>
                        <p>👉 If the FAQ is not helping, consider creating an issue on <a href="http://sfdc.co/OrgCheck-Backlog" target="_blank" rel="external noopener noreferrer">Org Check Issues tracker</a> along with the context and the following information.</p>
                        <br />
                        <ul class="slds-list_dotted">
                            <template for:each={errorChains} for:item="errorChain">
                                <li key={errorChain.index}>
                                    <b> Error #{errorChain.index}: {errorChain.message} </b>
                                    <pre class="tty">
                                        {errorChain.body}
                                    </pre>
                                </li>
                            </template>
                        </ul>
                    </template>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
    </template>
</template>
