<template>
    <template lwc:if={isShown}>
        <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="modal-heading-01" class="slds-modal slds-fade-in-open slds-modal_medium">
            <div class="slds-modal__container">
                <template lwc:if={isClosable}>
                    <lightning-icon icon-name="utility:close" alternative-text="Close" title="Close" onclick={handleClose} class="slds-modal__close"></lightning-icon>
                </template>
                <div class="slds-modal__header">
                    <h1 id="modal-heading-01" class="slds-modal__title slds-hyphenate">{headerTitle}</h1>
                </div>
                <div class="slds-modal__content modal-content">
                    <template lwc:if={message}>
                        <lightning-formatted-rich-text value={message}></lightning-formatted-rich-text>
                    </template>
                    <template lwc:if={errorChains.length}>
                        <div class="error-warning">
                            <p>👉 Please review our <a href="http://sfdc.co/OrgCheck-FAQ" target="_blank" 
                                rel="external noopener noreferrer">Org Check FAQ</a> and try to resolve 
                                this issue in your Org based on our community's feedback.</p>
                            <p>👉 If the FAQ is not helping, consider creating an issue on <a 
                                href="http://sfdc.co/OrgCheck-Backlog" target="_blank" 
                                rel="external noopener noreferrer">Org Check Issues tracker</a> along 
                                with the context and the following information.</p>
                        </div>
                        <br />
                        <ul class="slds-list_dotted">
                            <template for:each={errorChains} for:item="errorChain">
                                <li key={errorChain.index}>
                                    <b> Error #{errorChain.index}: {errorChain.message} </b>
                                    <pre class="tty">
                                        {errorChain.body}
                                    </pre>
                                </li>
                            </template>
                        </ul>
                    </template>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
    </template>
</template>
