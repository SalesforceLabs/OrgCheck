<template>
    <span lwc:if={useOrgCheck.manuallyAccepted}>
        <div class="slds-color__background_gray-1 slds-text-align_center slds-size_full slds-text-body_regular oneSystemMessage">
            <div aria-live="polite" class="slds-notify_alert system-message level-info slds-theme_info">
                Using Org Check in this Salesforce organization has been confirmed by you.
            </div>
        </div>
    </span>
    <span lwc:if={useOrgCheck.needConfirmation}>
        <div class="slds-text-align_center slds-size_full slds-text-body_regular oneSystemMessage">
            <div aria-live="polite" class="slds-notify_alert system-message level-info slds-theme_info" style="background-color: #7d7d57;">
                Using Org Check in this Salesforce organization needs your confirmation in the "Welcome" tab.
            </div>
        </div>
    </span>
    <div style="padding-bottom: 12px;">
        <lightning-layout>
            <lightning-layout-item padding="around-small">
                <div class="slds-media" tabindex="0">
                    <div class="slds-media__figure">
                        <object data={logoURL} type="image/svg+xml" style="width: 4rem; height: 2.9rem;"><img src={logoURL} width="4rem" height="2.9rem" alt="Org Check Logo" /></object>
                    </div>
                    <div class="slds-media__body">
                        <div class="slds-page-header__name">
                            <div class="slds-page-header__name-title">
                                <h1><span class="slds-page-header__title slds-truncate">Welcome in Org Check ({orgCheckVersion})</span></h1>
                                Monitor your org seamlessly (using Salesforce API v{salesforceApiVersion}.0)
                                <span lwc:if={isLoading}>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<img src="/img/loading.gif" alt="[loading]" />&nbsp;<font color="orange"><b>Please wait while loading...</b></font></span>
                                <br />
                            </div>
                        </div>
                    </div>
                </div>
            </lightning-layout-item>
            <lightning-layout-item padding="around-small" alignment-bump="left">
                <!-- Separator -->
                <lightning-icon icon-name="utility:threedots_vertical" alternative-text="separator" title="separator" class="slds-var-m-left_x-small"></lightning-icon>
                <!-- Org information -->
                <div class="slds-var-m-left_x-small" style="text-align: center; display: inline-table; vertical-align: middle;">
                    <lightning-badge label={orgInformation.name}></lightning-badge>
                    <br />
                    <lightning-badge label={orgInformation.type} class={orgInformation.theme}></lightning-badge>
                    <template lwc:if={orgLimit.hasInformation}>
                        &nbsp;
                        <lightning-badge label={orgLimit.usage} class={orgLimit.theme}></lightning-badge>
                    </template>
                </div>
            </lightning-layout-item>
        </lightning-layout>
        <c-orgcheck-spinner></c-orgcheck-spinner>
        <c-orgcheck-modal></c-orgcheck-modal>
        <lightning-layout>
            <lightning-layout-item padding="around-small">
                <lightning-input type="search" variant="label-hidden" name="search" onchange={handleNavigationMenuSearch}></lightning-input>
                <lightning-tree items={navigationMenuItems} onselect={handleNavigationMenuSelect}></lightning-tree>
            </lightning-layout-item>
            <lightning-layout-item padding="around-small">
                <c-orgcheck-global-filters onvalidatechange={handleFiltersValidated} onrefresh={handleFiltersRefreshed}></c-orgcheck-global-filters>
                <div data-key="orgcheck-content">
                    <div data-key="01" class="">
                        <lightning-layout>
                            <lightning-layout-item>
                                <lightning-card icon-name="standard:opportunity" title="General Information">
                                    <div class="slds-var-p-horizontal_small">
                                        Introducing <b>Org Check</b>. An easy-to-install and easy-to-use Salesforce application in order to quickly analyze your org and 
                                        its technical debt.<br /><br />
                                        <b>Support and feedback</b>
                                        <ul class="slds-list_dotted">
                                            <li><b>Issues or new ideas?</b> Track them at <a href="https://sfdc.co/OrgCheck-Backlog" 
                                                target="_blank" rel="external noopener noreferrer">sfdc.co/OrgCheck-Backlog</a></li>
                                            <li><b>Want to chat with other users?</b> Join us on the Trailblazer Community at <a href="https://sfdc.co/OrgCheck-Community" 
                                                target="_blank" rel="external noopener noreferrer">sfdc.co/OrgCheck-Community</a></li>
                                            <li><b>Social Media</b> Like and share posts on <a href="https://www.linkedin.com/company/OrgChecksfdc" 
                                                target="_blank" rel="external noopener noreferrer">LinkedIn</a>!</li>
                                        </ul>
                                        <br />
                                        <b>Org Check is free to use, but is not an official Salesforce product. </b> Org Check has not been officially tested or documented.
                                        Salesforce support is not available for Org Check. Support requests for Org Check should be directed to GitHub. Source code for Org 
                                        Check can be found on GitHub under separate and different license terms.<br /><br />
                                        <b>Third party components</b>
                                        <ul class="slds-list_dotted">
                                            <li><b>D3js</b>: distributed under the ISC license, more info at <a href="https://d3js.org" target="_blank" rel="external noopener noreferrer">d3js.org</a></li>
                                            <li><b>fflate</b>: distributed under the MIT license, more info at <a href="https://101arrowz.github.io/fflate" target="_blank" rel="external noopener noreferrer">101arrowz.github.io/fflate</a></li>
                                            <li><b>JsForce</b>: distributed under the MIT license, more info at <a href="https://jsforce.github.io" target="_blank" rel="external noopener noreferrer">jsforce.github.io</a></li>
                                            <li><b>SheetJS</b>: distributed under the Apache license v2.0, more info at <a href="https://sheetjs.com/" target="_blank" rel="external noopener noreferrer">sheetjs.com</a></li>
                                            <li><b>Lightning Flow Scanner</b>: distributed under the MIT License, more info at <a href="https://flow-scanner.github.io/lightning-flow-scanner" target="_blank" rel="external noopener noreferrer">flow-scanner.github.io/lightning-flow-scanner</a></li>
                                            <li><b>Xyris</b>: online website used to animated Org Checky (our mascot), more info at <a href="https://xyris.app/" target="_blank" rel="external noopener noreferrer">xyris.app</a></li>
                                        </ul>
                                    </div>
                                </lightning-card>
                            </lightning-layout-item>
                            <lightning-layout-item>
                                <template lwc:if={useOrgCheck.needConfirmation}>
                                    <lightning-card icon-name="utility:signature" title="Usage acceptance">
                                        <div class="slds-var-p-horizontal_small" style="background-color: lightgoldenrodyellow;">
                                            Using <b>Org Check</b> will increase the <b>Daily API Request governor limits</b> on this Salesforce organization. 
                                                Fortunately, the application has an internal system to <b>warn</b> when the limit starts reaching <b>70%</b> of
                                                the maximum, and, to <b>stop</b> when the limit starts reaching <b>90%</b> of the maximum.<br />
                                            <br />
                                            That being written, we encourage you to use Org Check in a <b>Sandbox</b> that is not crucial for your dev lifecycle,
                                                where if that Daily API Request governor limit hits its maximum, you will have very few impact. We discourage you 
                                                from using the application in your <b>Production</b> organization. Even if we put in place this check, we remind 
                                                you that Salesforce Labs applications like Org Check have no warranty of any sort (as described in our AppExchange 
                                                listing).<br />
                                            <br />
                                            <lightning-input type="toggle" label="Yes, I accept to use Org Check in this Salesforce environment." onclick={handleClickUsageAcceptance}></lightning-input>
                                        </div>
                                    </lightning-card>
                                </template>
                            </lightning-layout-item>
                        </lightning-layout>
                    </div>
                    <div data-key="02" class="slds-hide">
                        <lightning-card icon-name="standard:account" title="Metadata Cache">
                            <lightning-button label="Clear all" variant="destructive" slot="actions" onclick={handleRemoveAllCache}></lightning-button>
                            <div class="slds-var-p-horizontal_small">
                                List of cached metadata from the Salesforce org you want to check into your Browser persistant cache.<br />
                                <lightning-layout multiple-rows>
                                    <template lwc:if={data.cacheItems} for:each={data.cacheItems} for:item="item">
                                        <lightning-layout-item size="2" key={item.name} padding="around-small">
                                            <div class="viewCacheItem">
                                                <lightning-card>
                                                    <lightning-button-icon icon-name="utility:zoomin" alternative-text="Show details" slot="actions" onclick={handleLogCacheItem} data-item-name={item.name}></lightning-button-icon>
                                                    <h3 slot="title">
                                                        <lightning-layout vertical-align="center">
                                                            <lightning-layout-item>
                                                                <lightning-icon icon-name="utility:database" size="small"></lightning-icon>
                                                                &nbsp;
                                                            </lightning-layout-item>
                                                            <lightning-layout-item>
                                                                <div class="slds-line-clamp">{item.name}</div>
                                                            </lightning-layout-item>
                                                        </lightning-layout>
                                                    </h3>
                                                    <div slot="footer">
                                                        <lightning-badge class="slds-badge_lightest" lwc:if={item.created} icon-name="utility:date_time" label={item.created}></lightning-badge>
                                                        <lightning-badge class="slds-badge_lightest" lwc:if={item.isMap} icon-name="action:map" label="Map"></lightning-badge>
                                                        <lightning-badge class="slds-badge_lightest" lwc:else label="Object" icon-name="utility:sparkles" ></lightning-badge>
                                                    </div>
                                                    <div class="slds-var-p-horizontal_small">
                                                        <h1 class="slds-text-heading_large slds-align_absolute-center">
                                                            <lightning-formatted-number value={item.length}></lightning-formatted-number>
                                                        </h1>
                                                    </div>
                                                </lightning-card>
                                            </div>
                                        </lightning-layout-item>  
                                    </template>
                                </lightning-layout>
                            </div>
                        </lightning-card>
                    </div>
                    <div data-key="03" class="slds-hide">
                        <h1 class="slds-text-heading_large">How do you compute the scores in Org Check?</h1>
                        <ul class="slds-list_dotted">
                            <li><b>Org Check</b> uses a set of <b>rules</b> to compute its scores. <b>Rules</b> represent bad practices or 
                                anti-pattern if you will. These rules are listed in the matrix below in the row headers.</li>
                            <li>Org Check only analyzes <b>metadata</b> in your org, and not data. The list of metadata types can be seen in this 
                                matrix in the column headers, like Apex Classes, Email Templates, etc.</li>
                            <li>The way we <b>compute the score</b> is rather simple. For each metadata we analyze, depending on its type, we run a 
                                set of appropriate rules. Every time a rule is met, the score increases by <b>+1</b>.</li>
                        </ul>
                        <c-orgcheck-extended-datatable 
                            is-sticky-headers 
                            dont-use-all-space 
                            table-definition={tableDefinitions.scoreRules} 
                            rows={data.scoreRules}
                            show-export-button  
                            export-basename="Org Check Rules"></c-orgcheck-extended-datatable>
                    </div>
                    <!--<div name="04" class="slds-hide">
                        <lightning-layout>
                            <lightning-layout-item>
                                <h1 class="slds-text-heading_large">🗺️ Overview of your Salesforce Organization</h1>
                            </lightning-layout-item>
                            <lightning-layout-item alignment-bump="left">
                                <c-orgcheck-export-button lwc:if={showGlobalViewExportButton} label="Export all details" source={globalViewItemsExport} basename="GlobalView"></c-orgcheck-export-button>
                            </lightning-layout-item>
                        </lightning-layout>

                            <span class="slds-badge slds-theme_success">There are {globalViewData.length} items.</span>

                            <span class="slds-badge viewCard-some-bad-data">Items circled in red have at least one "bad" row.</span>
                            <span class="slds-badge viewCard-no-bad-data">Items circled in green have no "bad" row at all.</span>

                                                    <p>Sorry, we had an error loading this data...</p>

                        </template>
                    </div>-->
                    <div name="05" class="slds-hide">
                        <lightning-layout>
                            <lightning-layout-item>
                                <h1 class="slds-text-heading_large">🏖️ Hard-coded URLs in your Salesforce Organization</h1>
                            </lightning-layout-item>
                            <lightning-layout-item alignment-bump="left">
                                <c-orgcheck-export-button lwc:if={showhardCodedURLsViewExportButton} label="Export all details" source={hardCodedURLsViewItemsExport} basename="HardCodedURLs"></c-orgcheck-export-button>
                            </lightning-layout-item>
                        </lightning-layout>
                        <template lwc:if={data.hardCodedURLsViewData}>
                            <c-orgcheck-extended-datatable 
                                table-definition={tableDefinitions.hardCodedURLsView} 
                                rows={data.hardCodedURLsViewData} 
                                dont-use-all-space></c-orgcheck-extended-datatable>
                        </template>
                    </div>
                    <div data-key="06" class="slds-hide">
                        <template lwc:if={isObjectSpecified}>
                            <template lwc:if={data.objectData}>
                                <lightning-layout>
                                    <lightning-layout-item>
                                        <h1 class="slds-text-heading_large">{data.objectData.label} ({data.objectData.apiname})</h1>
                                    </lightning-layout-item>
                                    <lightning-layout-item alignment-bump="left">
                                        <!--<c-orgcheck-export-button source={objectInformationExportSource} basename={data.objectData.apiname}></c-orgcheck-export-button>-->
                                    </lightning-layout-item>
                                </lightning-layout>
                                <div class="slds-text-body_small">
                                    <span> | </span>
                                    <span lwc:if={data.objectData.apexTriggerRefs.length}><a href="#apexTriggers-0">Apex Triggers ({data.objectData.apexTriggerRefs.length})</a> | </span>
                                    <span lwc:if={data.objectData.workflowRuleRefs.length}><a href="#workflowRules-0">Workflow Rules ({data.objectData.workflowRuleRefs.length})</a> | </span>
                                    <span lwc:if={data.objectData.fieldSets.length}><a href="#fieldSets-0">Field Sets ({data.objectData.fieldSets.length})</a> | </span>
                                    <span lwc:if={data.objectData.layouts.length}><a href="#layouts-0">Page Layout ({data.objectData.layouts.length})</a> | </span>
                                    <span lwc:if={data.objectData.flexiPages.length}><a href="#flexiPages-0">Lightning Pages ({data.objectData.flexiPages.length})</a> | </span>
                                    <span lwc:if={data.objectData.limits.length}><a href="#limits-0">Limits ({data.objectData.limits.length})</a> | </span>
                                    <span lwc:if={data.objectData.validationRules.length}><a href="#validationRules-0">Validation Rules ({data.objectData.validationRules.length})</a> | </span>
                                    <span lwc:if={data.objectData.webLinks.length}><a href="#webLinks-0">Web Links ({data.objectData.webLinks.length})</a> | </span>
                                    <span lwc:if={data.objectData.customFieldRefs.length}><a href="#customFields-0">Custom Fields ({data.objectData.customFieldRefs.length})</a> | </span>
                                    <span lwc:if={data.objectData.standardFields.length}><a href="#standardFields-0">Standard Fields ({data.objectData.standardFields.length})</a> | </span>
                                    <span lwc:if={data.objectData.recordTypes.length}><a href="#recordTypes-0">Record Types ({data.objectData.recordTypes.length})</a> | </span>
                                    <span lwc:if={data.objectData.relationships.length}><a href="#relationships-0">Relationships ({data.objectData.relationships.length})</a> | </span>
                                </div>
                                <br />
                                <h1 class="slds-text-heading_medium">General information</h1>
                                <div class="slds-grid slds-gutters">
                                    <div class="slds-col">
                                        <div class="slds-has-divider_bottom"><lightning-input type="text" label="API Name" value={data.objectData.apiname} read-only></lightning-input></div>
                                        <div class="slds-has-divider_bottom"><lightning-input type="text" label="Object Type" value={data.objectData.typeRef.label} read-only></lightning-input></div>
                                        <div class="slds-has-divider_bottom"><lightning-input type="text" label="Package" value={data.objectData.package} read-only></lightning-input></div>
                                    </div>
                                    <div class="slds-col">
                                        <div class="slds-has-divider_bottom"><lightning-input type="text" label="Singular Label" value={data.objectData.label} read-only></lightning-input></div>
                                        <div class="slds-has-divider_bottom"><lightning-input type="text" label="Plural Label" value={data.objectData.labelPlural} read-only></lightning-input></div>
                                        <div class="slds-has-divider_bottom"><lightning-input type="text" label="Description" value={data.objectData.description} read-only></lightning-input></div>
                                    </div>
                                    <div class="slds-col">
                                        <div class="slds-has-divider_bottom"><lightning-input type="text" label="Key Prefix" value={data.objectData.keyPrefix} read-only></lightning-input></div>
                                        <div class="slds-has-divider_bottom"><lightning-input type="number" label="Record Count (including deleted ones)" value={data.objectData.recordCount} read-only></lightning-input></div>
                                    </div>
                                    <div class="slds-col">
                                        <div class="slds-has-divider_bottom"><lightning-input type="toggle" label="Is Custom?" value={data.objectData.isCustom} disabled></lightning-input></div>
                                        <div class="slds-has-divider_bottom"><lightning-input type="toggle" label="Feed Enable?" value={data.objectData.isFeedEnabled} disabled></lightning-input></div>
                                        <div class="slds-has-divider_bottom"><lightning-input type="toggle" label="Most Recent Enabled?" value={data.objectData.isMostRecentEnabled} disabled></lightning-input></div>
                                        <div class="slds-has-divider_bottom"><lightning-input type="toggle" label="Global Search Enabled?" value={data.objectData.isSearchable} disabled></lightning-input></div>
                                    </div>
                                    <div class="slds-col">
                                        <div class="slds-has-divider_bottom"><lightning-input type="text" label="Internal Sharing" value={data.objectData.internalSharingModel} read-only></lightning-input></div>
                                        <div class="slds-has-divider_bottom"><lightning-input type="text" label="External Sharing" value={data.objectData.externalSharingModel} read-only></lightning-input></div>
                                    </div>
                                </div>
                                <br /><br />
                                <template lwc:if={data.objectData.apexTriggerRefs.length}>
                                    <h1 class="slds-text-heading_medium"><a id="apexTriggers"></a>Apex Triggers</h1>
                                    <c-orgcheck-extended-datatable
                                        dont-use-all-space
                                        onviewscore={handleViewScore} 
                                        show-search
                                        show-statistics
                                        is-infinite-scrolling
                                        infinite-scrolling-initial-nb-rows=25
                                        infinite-scrolling-additional-nb-rows=100
                                        table-definition={tableDefinitions.apexTriggersInObject} 
                                        rows={data.objectData.apexTriggerRefs}></c-orgcheck-extended-datatable>
                                    <br /><br />
                                </template>
                                <template lwc:if={data.objectData.workflowRuleRefs.length}>
                                    <h1 class="slds-text-heading_medium"><a id="workflowRules"></a>Workflow Rules</h1>
                                    <c-orgcheck-extended-datatable
                                        dont-use-all-space
                                        onviewscore={handleViewScore} 
                                        show-search
                                        show-statistics
                                        is-infinite-scrolling
                                        infinite-scrolling-initial-nb-rows=25
                                        infinite-scrolling-additional-nb-rows=100
                                        table-definition={tableDefinitions.workflows} 
                                        rows={data.objectData.workflowRuleRefs}></c-orgcheck-extended-datatable>
                                    <br /><br />
                                </template>
                                <template lwc:if={data.objectData.fieldSets.length}>
                                    <h1 class="slds-text-heading_medium"><a id="fieldSets"></a>Field Sets</h1>
                                    <c-orgcheck-extended-datatable
                                        dont-use-all-space
                                        onviewscore={handleViewScore} 
                                        show-search
                                        show-statistics
                                        is-infinite-scrolling
                                        infinite-scrolling-initial-nb-rows=25
                                        infinite-scrolling-additional-nb-rows=100
                                        table-definition={tableDefinitions.fieldSets} 
                                        rows={data.objectData.fieldSets}></c-orgcheck-extended-datatable>
                                    <br /><br />
                                </template>
                                <template lwc:if={data.objectData.layouts.length}>
                                    <a id="layouts"></a>
                                    <h1 class="slds-text-heading_medium">Page Layouts</h1>
                                    <c-orgcheck-extended-datatable
                                        dont-use-all-space
                                        onviewscore={handleViewScore} 
                                        show-search
                                        show-statistics
                                        is-infinite-scrolling
                                        infinite-scrolling-initial-nb-rows=25
                                        infinite-scrolling-additional-nb-rows=100
                                        table-definition={tableDefinitions.pageLayouts} 
                                        rows={data.objectData.layouts}></c-orgcheck-extended-datatable>
                                    <br /><br />
                                </template>
                                <template lwc:if={data.objectData.flexiPages.length}>
                                    <a id="flexiPages"></a>
                                    <h1 class="slds-text-heading_medium">Lightning Pages</h1>
                                    <c-orgcheck-extended-datatable
                                        dont-use-all-space
                                        onviewscore={handleViewScore} 
                                        show-search
                                        show-statistics
                                        is-infinite-scrolling
                                        infinite-scrolling-initial-nb-rows=25
                                        infinite-scrolling-additional-nb-rows=100
                                        table-definition={tableDefinitions.flexiPagesInObject} 
                                        rows={data.objectData.flexiPages}></c-orgcheck-extended-datatable>
                                    <br /><br />
                                </template>
                                <template lwc:if={data.objectData.limits.length}>
                                    <a id="limits"></a>
                                    <h1 class="slds-text-heading_medium">Limits</h1>
                                    <c-orgcheck-extended-datatable
                                        dont-use-all-space
                                        onviewscore={handleViewScore} 
                                        show-search
                                        show-statistics
                                        is-infinite-scrolling
                                        infinite-scrolling-initial-nb-rows=25
                                        infinite-scrolling-additional-nb-rows=100
                                        table-definition={tableDefinitions.limits} 
                                        rows={data.objectData.limits}></c-orgcheck-extended-datatable>
                                    <br /><br />
                                </template>
                                <template lwc:if={data.objectData.validationRules.length}>
                                    <a id="validationRules"></a>
                                    <h1 class="slds-text-heading_medium">Validation Rules</h1>
                                    <c-orgcheck-extended-datatable
                                        dont-use-all-space
                                        onviewscore={handleViewScore} 
                                        show-search
                                        show-statistics
                                        is-infinite-scrolling
                                        infinite-scrolling-initial-nb-rows=25
                                        infinite-scrolling-additional-nb-rows=100
                                        table-definition={tableDefinitions.validationRulesInObject} 
                                        rows={data.objectData.validationRules}></c-orgcheck-extended-datatable>
