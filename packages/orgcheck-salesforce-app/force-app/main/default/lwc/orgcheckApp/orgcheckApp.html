<template>
    <span lwc:if={useOrgCheck.manuallyAccepted}>
        <div class="slds-color__background_gray-1 slds-text-align_center slds-size_full slds-text-body_regular oneSystemMessage">
            <div aria-live="polite" class="slds-notify_alert system-message level-info slds-theme_info">
                Using Org Check in this Salesforce organization has been confirmed by you.
            </div>
        </div>
    </span>
    <span lwc:if={useOrgCheck.needConfirmation}>
        <div class="slds-text-align_center slds-size_full slds-text-body_regular oneSystemMessage">
            <div aria-live="polite" class="slds-notify_alert system-message level-info slds-theme_info" style="background-color: #7d7d57;">
                Using Org Check in this Salesforce organization needs your confirmation.
            </div>
        </div>
    </span>
    <div style="padding-bottom: 12px">
        <lightning-layout>
            <!-- Logo and versions -->
            <lightning-layout-item padding="around-small">
                <div class="slds-media" tabindex="0">
                    <div class="slds-media__figure">
                        <object data={logoURL} type="image/svg+xml" style="width: 4rem; height: 2.9rem;"><img src={logoURL} width="4rem" height="2.9rem" alt="Org Check Logo" /></object>
                    </div>
                    <div class="slds-media__body">
                        <div class="slds-page-header__name">
                            <div class="slds-page-header__name-title">
                                <h1><span class="slds-page-header__title slds-truncate">Welcome in Org Check ({orgCheckVersion})</span></h1>
                                Monitor your org seamlessly (using Salesforce API v{salesforceApiVersion}.0)
                                <span lwc:if={isLoading}>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<img src="/img/loading.gif" alt="[loading]" />&nbsp;<font color="orange"><b>Please wait while loading...</b></font></span>
                                <br />
                            </div>
                        </div>
                    </div>
                </div>
            </lightning-layout-item>
            <lightning-layout-item padding="around-small" alignment-bump="left">
                <!-- Separator -->
                <lightning-icon icon-name="utility:threedots_vertical" alternative-text="separator" title="separator" class="slds-var-m-left_x-small"></lightning-icon>
                <!-- Org information -->
                <div class="slds-var-m-left_x-small" style="text-align: center; display: inline-table; vertical-align: middle;">
                    <lightning-badge label={orgInformation.name}></lightning-badge>
                    <br />
                    <lightning-badge label={orgInformation.type} class={orgInformation.theme}></lightning-badge>
                    <template lwc:if={orgLimit.hasInformation}>
                        &nbsp;
                        <lightning-badge label={orgLimit.usage} class={orgLimit.theme}></lightning-badge>
                    </template>
                </div>
            </lightning-layout-item>
        </lightning-layout>
        <!-- Spinner and modal utilities -->
        <c-orgcheck-spinner></c-orgcheck-spinner>
        <c-orgcheck-modal></c-orgcheck-modal>
        <!-- Acceptance screen (if needed) -->
        <div lwc:if={useOrgCheck.needConfirmation} class="pleaseAcceptTheTerms">
            <h1 class="slds-text-heading_medium">Just to let you know...</h1> 
            Using <b>Org Check</b> in this Salesforce organization <b>will</b> increase
            its <b>API Request limit</b>. The number of requests it will make to your org 
            really depends on how much metadata you have.
            <br />
            <br />
            <h1 class="slds-text-heading_medium">What is Salesforce saying about this limit?</h1> 
            If your org reaches or exceeds its daily API request limit, Salesforce still lets 
            the operations proceed by a certain amount, if possible. It helps avoid blocking 
            your workflows during unexpected spikes in workloads and occasional peak periods. 
            A hard cap is in place to safeguard platform resources and prevent API requests 
            from exceeding the daily limit unimpeded. (see <a href="https://developer.salesforce.com/docs/atlas.en-us.salesforce_app_limits_cheatsheet.meta/salesforce_app_limits_cheatsheet/salesforce_app_limits_platform_api.htm">developer.salesforce.com</a>)
            <br />
            <br />
            <h1 class="slds-text-heading_medium">How do we manage this limit in Org Check?</h1>
            <b>Org Check</b> is monitoring the <b>API Request limit</b> of your org every time it 
            uses the Salesforce APIs (and without any additional calls of course!). The usage of 
            this limit will be shown in the application everytime. Additionally, the application 
            will <b>warn</b> you when the limit starts reaching <b>70%</b>, and, 
            will <b>stop</b> working when the limit reaches <b>90%</b>.
            <br />
            <br />
            <h1 class="slds-text-heading_medium">Some last comments...</h1>
            We strongly encourage you to use Org Check in a <b>dedicated Sandbox</b> which
            is not part of your Salesforce development lifecycle. We discourage you from 
            using the application directly in your Production. Even if we put in place 
            a control about this limit, we remind you that Salesforce Labs applications
            (like Org Check) have no warranty of any sort (as described in our AppExchange 
            listing).
            <br />
            <br />
            <h1 class="slds-text-heading_medium">Now... Do you want to use Org Check in this Salesforce org?</h1>
            <div class="slds-text-align_center">
                <lightning-button variant="brand" title="Yes, I accept to use Org Check in this environment!" label="Yes" onclick={handleClickUsageAcceptance}></lightning-button>
                &nbsp;&nbsp;&nbsp;
                <lightning-button variant="destructive" title="No, I do not accept this terms and I will use Org Check in another environment instead." label="No"></lightning-button>
            </div>
        </div>
        <!-- The navigation, title, filters and content (only if the use was accepted!!) -->
        <div data-key="orgcheck-main" class="slds-hide">
            <lightning-layout>
                <!-- The left part with the navigation menu in form of a tree -->
                <lightning-layout-item padding="around-small" size="2">
                    <lightning-input type="search" variant="label-hidden" name="search" onchange={handleNavigationMenuSearch}></lightning-input>
                    <lightning-tree items={navigationMenuItems} selected-item={navigationMenuSelected} onselect={handleNavigationMenuSelect}></lightning-tree>
                </lightning-layout-item>
                <!-- The right part with the title, the filters and the content -->
                <lightning-layout-item size="10">
                    <!-- Top header with title and filters -->
                    <lightning-layout vertical-align="center" class="contentTitle">
                        <!-- The title -->
                        <lightning-layout-item padding="around-small">
                            <h1 class="slds-text-heading_large">
                                {currentContentTitle}
                            </h1>
                            &nbsp;&nbsp;
                            <lightning-button-icon icon-name="utility:sync" alternative-text="Refresh data" title="Refresh the current data being displayed" variant="border-filled" onclick={handleRefreshCurrentData} ></lightning-button-icon>
                        </lightning-layout-item>
                        <!-- The global filters -->
                        <lightning-layout-item alignment-bump="left">
                            <c-orgcheck-global-filters 
                                dropdown-alignment="right"
                                onvalidatechange={handleFiltersValidated} 
                                onrefresh={handleFiltersRefreshed}></c-orgcheck-global-filters>
                        </lightning-layout-item>
                    </lightning-layout>
                    <!-- The content -->
                    <lightning-card>
                        <div data-key="orgcheck-content">
                            <div data-key="01" class="slds-hide slds-var-p-horizontal_small">
                                Introducing <b>Org Check</b>. An easy-to-install and easy-to-use Salesforce application in order to quickly analyze your org and 
                                its technical debt.<br /><br />
                                <b>Support and feedback</b>
                                <ul class="slds-list_dotted">
                                    <li><b>Issues or new ideas?</b> Track them at <a href="https://sfdc.co/OrgCheck-Backlog" 
                                        target="_blank" rel="external noopener noreferrer">sfdc.co/OrgCheck-Backlog</a></li>
                                    <li><b>Want to chat with other users?</b> Join us on the Trailblazer Community at <a href="https://sfdc.co/OrgCheck-Community" 
                                        target="_blank" rel="external noopener noreferrer">sfdc.co/OrgCheck-Community</a></li>
                                    <li><b>Social Media</b> Like and share posts on <a href="https://www.linkedin.com/company/OrgChecksfdc" 
                                        target="_blank" rel="external noopener noreferrer">LinkedIn</a>!</li>
                                </ul>
                                <br />
                                <b>Org Check is free to use, but is not an official Salesforce product. </b> Org Check has not been officially tested or documented.
                                Salesforce support is not available for Org Check. Support requests for Org Check should be directed to GitHub. Source code for Org 
                                Check can be found on GitHub under separate and different license terms.<br /><br />
                                <b>Third party components</b>
                                <ul class="slds-list_dotted">
                                    <li><b>D3js</b>: distributed under the ISC license, more info at <a href="https://d3js.org" target="_blank" rel="external noopener noreferrer">d3js.org</a></li>
                                    <li><b>fflate</b>: distributed under the MIT license, more info at <a href="https://101arrowz.github.io/fflate" target="_blank" rel="external noopener noreferrer">101arrowz.github.io/fflate</a></li>
                                    <li><b>JsForce</b>: distributed under the MIT license, more info at <a href="https://jsforce.github.io" target="_blank" rel="external noopener noreferrer">jsforce.github.io</a></li>
                                    <li><b>SheetJS</b>: distributed under the Apache license v2.0, more info at <a href="https://sheetjs.com/" target="_blank" rel="external noopener noreferrer">sheetjs.com</a></li>
                                    <li><b>Lightning Flow Scanner</b>: distributed under the MIT License, more info at <a href="https://flow-scanner.github.io/lightning-flow-scanner" target="_blank" rel="external noopener noreferrer">flow-scanner.github.io/lightning-flow-scanner</a></li>
                                    <li><b>Xyris</b>: online website used to animated Org Checky (our mascot), more info at <a href="https://xyris.app/" target="_blank" rel="external noopener noreferrer">xyris.app</a></li>
                                </ul>
                            </div>
                            <div data-key="02" class="slds-hide slds-var-p-horizontal_small">
                                List of cached metadata from the Salesforce org you want to check into your Browser persistant cache.<br />
                                <lightning-layout multiple-rows>
                                    <template lwc:if={data.cache} for:each={data.cache} for:item="item">
                                        <lightning-layout-item size="2" key={item.name} padding="around-small">
                                            <div class="viewCacheItem">
                                                <lightning-card>
                                                    <lightning-button-icon icon-name="utility:zoomin" alternative-text="Show details" slot="actions" onclick={handleLogCacheItem} data-item-name={item.name}></lightning-button-icon>
                                                    <h3 slot="title">
                                                        <lightning-layout vertical-align="center">
                                                            <lightning-layout-item>
                                                                <lightning-icon icon-name="utility:database" size="small"></lightning-icon>
                                                                &nbsp;
                                                            </lightning-layout-item>
                                                            <lightning-layout-item>
                                                                <div class="slds-line-clamp">{item.name}</div>
                                                            </lightning-layout-item>
                                                        </lightning-layout>
                                                    </h3>
                                                    <div slot="footer">
                                                        <lightning-badge class="slds-badge_lightest" lwc:if={item.created} icon-name="utility:date_time" label={item.created}></lightning-badge>
                                                        <lightning-badge class="slds-badge_lightest" lwc:if={item.isMap} icon-name="action:map" label="Map"></lightning-badge>
                                                        <lightning-badge class="slds-badge_lightest" lwc:else label="Object" icon-name="utility:sparkles" ></lightning-badge>
                                                    </div>
                                                    <div class="slds-var-p-horizontal_small">
                                                        <h1 class="slds-text-heading_large slds-align_absolute-center">
                                                            <lightning-formatted-number value={item.length}></lightning-formatted-number>
                                                        </h1>
                                                    </div>
                                                </lightning-card>
                                            </div>
                                        </lightning-layout-item>  
                                    </template>
                                </lightning-layout>
                                <br /><br />
                                If you want to clear all the cache items and restart the application click on the following button:<br />
                                <lightning-button label="Clear all" style="width: 100%" variant="destructive" onclick={handleRemoveAllCache}></lightning-button>
                            </div>
                            <div data-key="03" class="slds-hide slds-var-p-horizontal_small">
                                <p>
                                    <b>Org Check</b> uses a set of <b>rules</b> to compute its scores. <b>Rules</b> represent bad practices or 
                                    anti-pattern if you will. These rules are listed in the matrix below in the row headers.
                                </p>
                                <p>
                                    The way we <b>compute the score</b> is rather simple. For each metadata we analyze, depending on its type, 
                                    we run a set of appropriate rules. Every time a rule is met, the score increases by <b>+1</b>.
                                </p>
                                <c-orgcheck-extended-datatable 
                                    is-sticky-headers 
                                    dont-use-all-space 
                                    table-definition={tableDefinitions.scorerules} 
                                    rows={data.scorerules}
                                    show-export-button  
                                    export-basename="Org Check Rules"></c-orgcheck-extended-datatable>
                            </div>
                            <div data-key="04" class="slds-hide slds-var-p-horizontal_small">
                                <template lwc:if={data.globalview}>
                                    <lightning-layout>
                                        <lightning-layout-item>
                                            <span class="slds-badge slds-theme_success">There are {data.globalview.length} items.</span>
                                            <span class="slds-badge">Items are sorted by number of "bad" rows in descending order.</span>
                                            <br /><br />
                                            <span class="slds-badge viewCard-some-bad-data">Contains at least one "bad" row.</span>
                                            <span class="slds-badge viewCard-no-bad-data">Contains no "bad" row at all.</span>
                                            <span class="slds-badge viewCard-error">Error while retrieving the data</span>
                                        </lightning-layout-item>
                                        <lightning-layout-item alignment-bump="left">
                                            <c-orgcheck-export-button label="Export all details" source={globalViewItemsExport} basename="GlobalView"></c-orgcheck-export-button>
                                        </lightning-layout-item>
                                    </lightning-layout>
                                    <lightning-layout multiple-rows>
                                        <template for:each={data.globalview} for:item="item">
                                            <lightning-layout-item size="4" padding="around-small" key={item.label}>
                                                <div class={item.class}>
                                                    <lightning-card>
                                                        <h1 class="slds-text-heading_medium" slot="title">{item.label}</h1>
                                                        <lightning-button-icon 
                                                            slot="actions"
                                                            variant="border-filled" 
                                                            icon-name="utility:new_window"
                                                            title="Go the corresponding page and see the details for this type of items..."
                                                            onclick={handleOpenPage}
                                                            data-key-page={item.keyPage}></lightning-button-icon>
                                                        <template lwc:if={item.hadError}>
                                                            <p>Sorry, we had an error loading this data...</p>
                                                        </template>
                                                        <template lwc:else>
                                                            <section lwc:if={item.countBad}>
                                                                <p class="slds-text-heading_small"><b>{item.countBad}</b> items to correct for the below reasons:</p>
                                                                <c-orgcheck-extended-datatable 
                                                                    table-definition={item.tableDefinition} 
                                                                    rows={item.data}></c-orgcheck-extended-datatable>
                                                            </section>
                                                            <section lwc:else class="slds-var-p-horizontal_small">
                                                                <p>All good!!</p>
                                                            </section>
                                                        </template>
                                                    </lightning-card>
                                                </div>
                                            </lightning-layout-item>  
                                        </template>
                                    </lightning-layout>
                                </template> 
                                <template lwc:else>
                                    <span><img src="/img/loading.gif" alt="[loading]" />&nbsp;<font color="orange"><b>Please wait while the overview is loading...</b></font></span>
                                </template>
                            </div>
                            <div data-key="05" class="slds-hide slds-var-p-horizontal_small">
                                <c-orgcheck-extended-datatable 
                                    table-definition={tableDefinitions.hardcodedurls} 
                                    rows={data.hardcodedurls} 
                                    show-export-button  
                                    export-basename="HardCodedURLs"
                                    dont-use-all-space></c-orgcheck-extended-datatable>
                            </div>
                            <div data-key="06" class="slds-hide slds-var-p-horizontal_small">
                                <template lwc:if={isObjectSpecified}>
                                    <template lwc:if={data.object}>
                                        <lightning-layout>
                                            <lightning-layout-item>
                                                <h1 class="slds-text-heading_large">{data.object.label} ({data.object.apiname})</h1>
                                            </lightning-layout-item>
                                            <lightning-layout-item alignment-bump="left">
                                                <c-orgcheck-export-button source={objectInformationExportSource} basename={data.object.apiname}></c-orgcheck-export-button>
                                            </lightning-layout-item>
                                        </lightning-layout>
                                        <div class="slds-text-body_small">
                                            <span> | </span>
                                            <span lwc:if={data.object.apexTriggerRefs.length}><a href="#apexTriggers0">Apex Triggers ({data.object.apexTriggerRefs.length})</a> | </span>
                                            <span lwc:if={data.object.workflowRuleRefs.length}><a href="#workflowRules0">Workflow Rules ({data.object.workflowRuleRefs.length})</a> | </span>
                                            <span lwc:if={data.object.fieldSets.length}><a href="#fieldSets0">Field Sets ({data.object.fieldSets.length})</a> | </span>
                                            <span lwc:if={data.object.layouts.length}><a href="#layouts0">Page Layout ({data.object.layouts.length})</a> | </span>
                                            <span lwc:if={data.object.flexiPages.length}><a href="#flexiPages0">Lightning Pages ({data.object.flexiPages.length})</a> | </span>
                                            <span lwc:if={data.object.limits.length}><a href="#limits0">Limits ({data.object.limits.length})</a> | </span>
                                            <span lwc:if={data.object.validationRules.length}><a href="#validationRules0">Validation Rules ({data.object.validationRules.length})</a> | </span>
                                            <span lwc:if={data.object.webLinks.length}><a href="#webLinks0">Web Links ({data.object.webLinks.length})</a> | </span>
                                            <span lwc:if={data.object.customFieldRefs.length}><a href="#customFields0">Custom Fields ({data.object.customFieldRefs.length})</a> | </span>
                                            <span lwc:if={data.object.standardFields.length}><a href="#standardFields0">Standard Fields ({data.object.standardFields.length})</a> | </span>
                                            <span lwc:if={data.object.recordTypes.length}><a href="#recordTypes0">Record Types ({data.object.recordTypes.length})</a> | </span>
                                            <span lwc:if={data.object.relationships.length}><a href="#relationships0">Relationships ({data.object.relationships.length})</a> | </span>
                                        </div>
                                        <br />
                                        <h1 class="slds-text-heading_medium">General information</h1>
                                        <div class="slds-grid slds-gutters">
                                            <div class="slds-col">
                                                <div class="slds-has-divider_bottom"><lightning-input type="text" label="API Name" value={data.object.apiname} read-only></lightning-input></div>
                                                <div class="slds-has-divider_bottom"><lightning-input type="text" label="Object Type" value={data.object.typeRef.label} read-only></lightning-input></div>
                                                <div class="slds-has-divider_bottom"><lightning-input type="text" label="Package" value={data.object.package} read-only></lightning-input></div>
                                            </div>
                                            <div class="slds-col">
                                                <div class="slds-has-divider_bottom"><lightning-input type="text" label="Singular Label" value={data.object.label} read-only></lightning-input></div>
                                                <div class="slds-has-divider_bottom"><lightning-input type="text" label="Plural Label" value={data.object.labelPlural} read-only></lightning-input></div>
                                                <div class="slds-has-divider_bottom"><lightning-input type="text" label="Description" value={data.object.description} read-only></lightning-input></div>
                                            </div>
                                            <div class="slds-col">
                                                <div class="slds-has-divider_bottom"><lightning-input type="text" label="Key Prefix" value={data.object.keyPrefix} read-only></lightning-input></div>
                                                <div class="slds-has-divider_bottom"><lightning-input type="number" label="Record Count (including deleted ones)" value={data.object.recordCount} read-only></lightning-input></div>
                                            </div>
                                            <div class="slds-col">
                                                <div class="slds-has-divider_bottom"><lightning-input type="toggle" label="Is Custom?" value={data.object.isCustom} disabled></lightning-input></div>
                                                <div class="slds-has-divider_bottom"><lightning-input type="toggle" label="Feed Enable?" value={data.object.isFeedEnabled} disabled></lightning-input></div>
                                                <div class="slds-has-divider_bottom"><lightning-input type="toggle" label="Most Recent Enabled?" value={data.object.isMostRecentEnabled} disabled></lightning-input></div>
                                                <div class="slds-has-divider_bottom"><lightning-input type="toggle" label="Global Search Enabled?" value={data.object.isSearchable} disabled></lightning-input></div>
                                            </div>
                                            <div class="slds-col">
                                                <div class="slds-has-divider_bottom"><lightning-input type="text" label="Internal Sharing" value={data.object.internalSharingModel} read-only></lightning-input></div>
                                                <div class="slds-has-divider_bottom"><lightning-input type="text" label="External Sharing" value={data.object.externalSharingModel} read-only></lightning-input></div>
                                            </div>
                                        </div>
                                        <br /><br />
                                        <template lwc:if={data.object.apexTriggerRefs.length}>
                                            <h1 class="slds-text-heading_medium"><a id="apexTriggers"></a>Apex Triggers</h1>
                                            <c-orgcheck-extended-datatable
                                                dont-use-all-space 
                                                onviewscore={handleViewScore} 
                                                show-search
                                                show-statistics
                                                is-infinite-scrolling
                                                infinite-scrolling-initial-nb-rows=25
                                                infinite-scrolling-additional-nb-rows=100
                                                table-definition={tableDefinitions.apextriggersinobject} 
                                                rows={data.object.apexTriggerRefs}></c-orgcheck-extended-datatable>
                                            <br /><br />
                                        </template>
                                        <template lwc:if={data.object.workflowRuleRefs.length}>
                                            <h1 class="slds-text-heading_medium"><a id="workflowRules"></a>Workflow Rules</h1>
                                            <c-orgcheck-extended-datatable
                                                dont-use-all-space 
                                                onviewscore={handleViewScore} 
                                                show-search
                                                show-statistics
                                                is-infinite-scrolling
                                                infinite-scrolling-initial-nb-rows=25
                                                infinite-scrolling-additional-nb-rows=100
                                                table-definition={tableDefinitions.workflowsinobject} 
                                                rows={data.object.workflowRuleRefs}></c-orgcheck-extended-datatable>
                                            <br /><br />
                                        </template>
                                        <template lwc:if={data.object.fieldSets.length}>
                                            <h1 class="slds-text-heading_medium"><a id="fieldSets"></a>Field Sets</h1>
                                            <c-orgcheck-extended-datatable
                                                dont-use-all-space 
                                                onviewscore={handleViewScore} 
                                                show-search
                                                show-statistics
                                                is-infinite-scrolling
                                                infinite-scrolling-initial-nb-rows=25
                                                infinite-scrolling-additional-nb-rows=100
                                                table-definition={tableDefinitions.fieldsetsinobject} 
                                                rows={data.object.fieldSets}></c-orgcheck-extended-datatable>
                                            <br /><br />
                                        </template>
                                        <template lwc:if={data.object.layouts.length}>
                                            <a id="layouts"></a>
                                            <h1 class="slds-text-heading_medium">Page Layouts</h1>
                                            <c-orgcheck-extended-datatable
                                                dont-use-all-space 
                                                onviewscore={handleViewScore} 
                                                show-search
                                                show-statistics
                                                is-infinite-scrolling
                                                infinite-scrolling-initial-nb-rows=25
                                                infinite-scrolling-additional-nb-rows=100
                                                table-definition={tableDefinitions.pagelayoutsinobject} 
                                                rows={data.object.layouts}></c-orgcheck-extended-datatable>
                                            <br /><br />
                                        </template>
                                        <template lwc:if={data.object.flexiPages.length}>
                                            <a id="flexiPages"></a>
                                            <h1 class="slds-text-heading_medium">Lightning Pages</h1>
                                            <c-orgcheck-extended-datatable
                                                dont-use-all-space 
                                                onviewscore={handleViewScore} 
                                                show-search
                                                show-statistics
                                                is-infinite-scrolling
                                                infinite-scrolling-initial-nb-rows=25
                                                infinite-scrolling-additional-nb-rows=100
                                                table-definition={tableDefinitions.flexipagesinobject} 
                                                rows={data.object.flexiPages}></c-orgcheck-extended-datatable>
                                            <br /><br />
                                        </template>
                                        <template lwc:if={data.object.limits.length}>
                                            <a id="limits"></a>
                                            <h1 class="slds-text-heading_medium">Limits</h1>
                                            <c-orgcheck-extended-datatable
                                                dont-use-all-space
